version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    volumes:
      # Persist incidents database and alert drop-zone on the host
      - ./data:/app/data
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/incidents')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
