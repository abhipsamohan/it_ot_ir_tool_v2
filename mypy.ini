[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
# Third-party libraries (Flask, sqlite3, etc.) may lack stubs — skip missing
ignore_missing_imports = True
# Treat each directory as a namespace package (no __init__.py required)
explicit_package_bases = True
# Engine and dashboard modules use existing type hints; enable incrementally
files = engine/decision_engine.py, engine/database.py
